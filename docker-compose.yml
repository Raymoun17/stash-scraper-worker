services:
  scraper-worker:
    build:
      context: .
      target: runtime
    container_name: ${SCRAPER_CONTAINER_NAME:-stash-scraper-worker}
    restart: unless-stopped
    environment:
      SCRAPER_HOST: ${SCRAPER_BIND_HOST:-0.0.0.0}
      SCRAPER_PORT: ${SCRAPER_PORT:-8000}
      SCRAPER_SERVICE_TOKEN: ${SCRAPER_SERVICE_TOKEN:-stash-local-service-token}
      SCRAPER_BACKEND: playwright-stealth
      SCRAPER_MAX_CONCURRENCY: ${SCRAPER_MAX_CONCURRENCY:-2}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - stash-network
    develop:
      watch:
        - action: rebuild
          path: .
          ignore:
            - __pycache__/
            - .venv/
            - .git/
            - .env*
            - "*.pyc"

networks:
  stash-network:
    external: true
    name: ${NETWORK_NAME:-stash-network}
